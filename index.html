<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>农安县实验中学九班资源网</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: default;
    }

    /* 白色主题全局 */
    html, body {
      min-height: 100vh;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #333;
      line-height: 1.7;
      overflow-x: hidden;
      background: #ffffff;
    }

    /* 视频背景 */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }

    .video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
    }

    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(250,245,248,0.85) 100%);
    }

    /* 布局容器 */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 45px;
      position: relative;
      z-index: 1;
    }

    /* 首屏 */
    .hero-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    /* 粉色渐变标题 */
    .title {
      font-size: 3.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ff9bbb, #f87098, #ff5e9a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeInUp 1.2s ease forwards;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #666;
      max-width: 600px;
      opacity: 0;
      animation: fadeInUp 1.2s ease 0.3s forwards;
    }

    /* 滚动提示 */
    .scroll-indicator {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeInUp 1s ease 1.5s forwards;
      color: #999;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .scroll-indicator i {
      font-size: 22px;
      color: #ff76a2;
      animation: bounce 2s infinite;
    }

    /* 卡片样式：白色+粉色点缀 */
    .item {
      width: 100%;
      background: #ffffff;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 8px 28px rgba(255, 118, 162, 0.08);
      border: 1px solid rgba(255, 118, 162, 0.12);
      transition: all 0.35s ease;
      opacity: 0;
      animation: fadeInUp 1.2s ease forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .item:hover {
      transform: translateY(-8px);
      box-shadow: 0 14px 36px rgba(255, 118, 162, 0.15);
      border-color: rgba(255, 118, 162, 0.3);
    }

    /* 图片 */
    .item img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .item img:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 28px rgba(0,0,0,0.1);
    }

    .item h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #444;
    }

    /* 粉色下载提示 */
    .download-tip {
      font-size: 14px;
      color: #ff5e9a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .download-tip i {
      font-size: 16px;
    }

    /* 底部文字 */
    .bottom {
      margin-top: 60px;
      padding: 40px 0;
      text-align: center;
      font-size: 1.3rem;
      color: #ff5e9a;
      opacity: 0;
      animation: fadeInUp 1.2s ease forwards;
    }

    /* 动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    /* 卡片动画延迟 */
    .item1 { animation-delay: 0.4s; }
    .item2 { animation-delay: 0.6s; }
    .item3 { animation-delay: 0.8s; }
    .item4 { animation-delay: 1.0s; }
    .item5 { animation-delay: 1.2s; }
    .item6 { animation-delay: 1.4s; }
    .item7 { animation-delay: 1.6s; }

    /* 响应式 */
    @media (max-width:768px) {
      .title { font-size: 2.5rem; }
      .item { padding: 24px; }
      .wrap { padding: 40px 16px; gap: 40px; }
    }

    @media (max-width:480px) {
      .title { font-size: 2.1rem; }
      .item { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- 视频背景 -->
<div class="video-container">
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-starry-night-sky-over-a-lake-1125-large.mp4" type="video/mp4">

<!-- 首屏 -->

    <span class="download-tip"><i class="fas fa-download"></i> 点击图片即可下载</span>

  <div class="item item4">
    <img src="./4.jpg" alt="孙继远比手势" onclick="downloadImage(this.src, '孙继远比手势.jpg')">

  <div class="item item5">

    <img src="./5.JPG" alt="孙继远上体育课" onclick="downloadImage(this.src, '孙继远上体育课.jpg')">

  <div class="item item6">
    <img src="./6.jpg" alt="孙继远上厕所" onclick="downloadImage(this.src, '孙继远上厕所.jpg')">
    <img src="./6.JPG" alt="孙继远上厕所" onclick="downloadImage(this.src, '孙继远上厕所.jpg')">

  <div class="item item7">

  </div>
</div>

<div class="bottom">
  <i class="fas fa-heart"></i> 孙继远欠我两块钱
</div>

<!-- 下载功能JS -->
<script>
  function downloadImage(url, name) {
    const link = document.createElement('a');
    link.download = name;
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // 粉色下载提示
    const tip = document.createElement('div');
    tip.innerHTML = `<i class="fas fa-check-circle"></i> 已开始下载：${name}`;
    tip.style.cssText = `
      position: fixed; top:20px; right:20px;
      background:#ff5e9a; color:white;
      padding:12px 20px; border-radius:10px;
      z-index:999; font-size:14px;
      box-shadow:0 4px 15px rgba(255,94,154,0.2);
      animation: slideIn 0.3s, fadeOut 0.3s 2.5s forwards;
    `;
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(), 3000);
  }

  // 动画
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
