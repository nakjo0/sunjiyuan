<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孙继远资源网</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: default;
    }

    /* 全局基础：高级极简 */
    html, body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #111;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* 核心容器 */
    .wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 100px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* 标题渐入动画 */
    .title {
      font-size: 30px;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .subtitle {
      font-size: 18px;
      color: #666;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.2s forwards;
    }

    /* 内容模块：依次渐入 */
    .item {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      position: relative;
    }

    /* 图片：优雅动效 + 圆角 + 下载鼠标样式 */
    .item img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      cursor: pointer; /* 鼠标变成小手，提示可点击 */
    }

    /* 悬浮微动：高级感 */
    .item img:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    /* 下载提示文字 */
    .download-tip {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
      opacity: 0.8;
    }

    /* 底部文字 */
    .bottom {
      margin-top: 60px;
      padding: 40px 0;
      text-align: center;
      font-size: 20px;
      color: #444;
      opacity: 0;
      animation: fadeIn 1.2s ease 1.2s forwards;
    }

    /* 渐入动画核心 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 依次延迟：让页面更有层次 */
    .item1 { animation-delay: 0.4s; }
    .item2 { animation-delay: 0.6s; }
    .item3 { animation-delay: 0.8s; }

  </style>
</head>
<body>

<div class="wrap">
  <h1 class="title">孙继远资源网</h1>
  <p class="subtitle">欢迎访问</p>

  <!-- 图片1 + 点击下载 -->
  <div class="item item1">
    <img src="111.jpg" alt="孙继远思考" onclick="downloadImage(this.src, '孙继远思考.jpg')">
    <h2 class="title">孙继远思考</h2>
    <span class="download-tip">点击图片即可下载</span>
  </div>

  <!-- 图片2 + 点击下载 -->
  <div class="item item2">
    <img src="2.jpg" alt="孙继远过生日" onclick="downloadImage(this.src, '孙继远过生日.jpg')">
    <h2 class="title">孙继远过生日</h2>
    <span class="download-tip">点击图片即可下载</span>
  </div>

  <!-- 图片3 + 点击下载 -->
  <div class="item item3">
    <img src="3.jpg" alt="孙继远上厕所" onclick="downloadImage(this.src, '孙继远上厕所.jpg')">
    <h2 class="title">孙继远上厕所</h2>
    <span class="download-tip">点击图片即可下载</span>
  </div>
</div>

<div class="bottom">
  孙继远欠我两块钱
</div>

<!-- 图片下载核心JS -->
<script>
  function downloadImage(url, name) {
    const link = document.createElement('a');
    link.download = name; // 下载后的文件名
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
</script>

</body>
</html>
